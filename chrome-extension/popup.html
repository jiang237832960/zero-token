<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #1890ff;
    }
    .status {
      margin-bottom: 16px;
    }
    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .status-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .logged-in {
      background: #52c41a;
      color: white;
    }
    .logged-out {
      background: #d9d9d9;
      color: #666;
    }
    .btn {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-primary {
      background: #1890ff;
      color: white;
    }
    .btn-primary:hover {
      background: #40a9ff;
    }
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
      font-size: 12px;
      color: #999;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>ZeroToken Proxy</h1>
  
  <div id="status" class="status">
    <div class="loading">加载中...</div>
  </div>
  
  <div class="footer">
    <p>确保已在对应 AI 网站登录</p>
    <p>刷新页面后 Cookie 状态会自动更新</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
